<div class="messages-container">
  @for (msg of mgService.messages$ | async; track msg.id) {
    <ng-container
      [ngTemplateOutlet]="message"
      [ngTemplateOutletContext]="{ $implicit: msg, index: msg.id }"
    >
    </ng-container>
  }
</div>

<ng-template #message let-msg let-index="index">
  <div class="message-container">
    <div class="envelope-icon">
      <fa-icon [icon]="faEnvelope"></fa-icon>
    </div>
    <div class="message-content">
      <h3 class="message-type">{{ msg.type }}</h3>
      <p class="message-text">{{ msg.text }}</p>
    </div>
    <fa-icon
      [icon]="faCircleXmark"
      size="xl"
      class="delete-icon"
      (click)="deleteMessage(msg.id)"
    ></fa-icon>
  </div>
</ng-template>
